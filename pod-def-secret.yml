---
apiVersion: v1
kind: Pod
metadata:
  name: postgress-db
  labels:
    app: db
    owner: intellqit

spec:
  containers:
    - name: mypostgress
      image: postgres
      env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: a

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: b

        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: c
...
